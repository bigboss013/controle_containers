<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Controle de Containers</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="page-login"></div>

  <div id="app-shell" class="app hidden">
    <div class="appbar">
      <div>
        <h2>Santos Transportes</h2>
        <div class="user-info" id="user-display"></div>
      </div>
      <div class="appbar-actions">
        <button onclick="Router.navigate('ia')" title="Ana IA">🤖</button>
        <button onclick="logout()" title="Sair">🚪</button>
      </div>
    </div>

    <div class="page" id="page-dashboard"></div>
    <div class="page hidden" id="page-entrada"></div>
    <div class="page hidden" id="page-deadline"></div>
    <div class="page hidden" id="page-historico"></div>
    <div class="page hidden" id="page-usuarios"></div>
    <div class="page" id="page-mapa" style="padding:0"></div>
    <div class="page hidden" id="page-ia"></div>

    <nav class="bottom-nav" id="bottom-nav"></nav>

    <button class="fab" onclick="Router.navigate('ia')" title="Ana IA">🤖</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/store.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/router.js"></script>
  <script src="js/components/containerCard.js"></script>
  <script src="js/pages/login.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/entrada.js"></script>
  <script src="js/pages/deadline.js"></script>
  <script src="js/pages/historico.js"></script>
  <script src="js/pages/mapa.js"></script>
  <script src="js/pages/ia.js"></script>
  <script src="js/pages/usuarios.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
