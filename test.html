<!DOCTYPE html>
<html><head><title>Firebase Test</title></head><body>
<h2>Firebase Diagnostico</h2>
<pre id="log"></pre>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
var l = document.getElementById('log');
function a(m) { l.textContent += m + '\n'; }
try {
  firebase.initializeApp({
    apiKey: "AIzaSyCje8V9yQcgJ6LJL1AhyViKq8ArtjARsRA",
    projectId: "santos-transportes"
  });
  a("Firebase Init OK");
  firebase.firestore().collection("usuarios").get()
    .then(function(s) {
      a("Firestore OK: " + s.size + " documentos");
      s.forEach(function(d) { a("  " + d.id + " => " + JSON.stringify(d.data())); });
    })
    .catch(function(e) {
      a("ERRO Firestore: " + e.code);
      a("Mensagem: " + e.message);
      a("Detalhes: " + JSON.stringify(e));
    });
} catch(e) {
  a("ERRO Init: " + e.message);
}
</script>
</body></html>
