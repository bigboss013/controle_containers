name: controle_containers
description: Aplicativo para controle de entradas, saidas e armazenamento de conteineres.
publish_to: 'none'
version: 1.0.33

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  image_picker: ^1.2.1
  shared_preferences: ^2.5.5
  firebase_core: ^3.12.1
  cloud_firestore: ^5.6.5
  local_auth: ^2.3.0
  url_launcher: ^6.3.1
  package_info_plus: ^8.3.0
  open_file: ^3.5.4
  path_provider: ^2.1.5
  permission_handler: ^11.4.0
  speech_to_text: ^7.0.0
  google_mlkit_text_recognition: ^0.13.0
  excel: ^4.0.6
  file_picker: ^8.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon_app.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/santos_transportes_login.jpg
    - assets/images/icone_santos.jpg
