name: controle_containers
description: Aplicativo para controle de entradas, saidas e armazenamento de conteineres.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  google_mlkit_text_recognition: ^0.15.1
  image_picker: ^1.2.1
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon_app.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/santos_transportes_login.jpg
    - assets/images/icone_santos.jpg
